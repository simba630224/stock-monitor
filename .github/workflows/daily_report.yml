name: Daily Credit Card Report

on:
  schedule:
    - cron: '0 0 * * *' # 台北時間 08:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 提升版本以消除警告
      - name: Install dependencies
        run: pip install google-genai requests # 使用新版 SDK
      - name: Run script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # 建議 GitHub Secrets 也改名
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_cc_report.py
