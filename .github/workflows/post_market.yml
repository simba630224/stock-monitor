name: 每日投資組合報告

on:
  schedule:
    # 每天 UTC 10:00 = 台灣時間 18:00
    - cron: '0 10 * * *'
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 使用較新版本避免 yfinance 問題

      - name: 安裝套件
        run: |
          pip install yfinance pandas requests numpy

      - name: 執行報告程式
        env:
          # 重點：這裡的左邊是程式讀取的名字，右邊是 GitHub 的 Secret 名字
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== 系統診斷開始 ==="
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ 診斷結果：GitHub Shell 完全抓不到 TOKEN 變數"
          else
            echo "✅ 診斷結果：GitHub Shell 已成功接收 TOKEN 變數"
          fi
          echo "===================="
        run: |
          python daily_portfolio_report.py
