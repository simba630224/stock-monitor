name: 每日投資組合報告

on:
  schedule:
    # 每天 UTC 10:00 = 台灣時間 18:00
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy matplotlib

      - name: 執行報告程式
        env:
          # 同時提供兩種變數名，確保程式一定能讀到
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== 系統診斷開始 ==="
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ 診斷結果：GitHub Secrets 未正確載入"
          else
            echo "✅ 診斷結果：Secrets 載入成功"
          fi
          echo "===================="
          python daily_portfolio_report.py
