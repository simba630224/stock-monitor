name: 每日投資組合報告

on:
  schedule:
    # 每天 UTC 10:00 = 台灣時間 18:00
    - cron: '0 10 * * *'
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 使用較新版本避免 yfinance 問題

      - name: 安裝套件
        run: |
          pip install yfinance pandas requests numpy

      - name: 執行報告程式
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python daily_portfolio_report.py
