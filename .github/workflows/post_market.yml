name: 2. 台北盤後資產報告 (17:00)

on:
  schedule:
    # 台北 17:00 = UTC 09:00
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  portfolio_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install yfinance pandas requests
      - name: 執行資產報告
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 這裡執行你其他的資訊腳本，例如 daily_portfolio_report.py
          if [ -f daily_portfolio_report.py ]; then
            python daily_portfolio_report.py
          else
            echo "找不到資產報告檔案"
          fi
