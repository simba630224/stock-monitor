name: 1. 台北盤前全方位分析 (07:15 避峰版)

on:
  schedule:
    # 台北時間週一至週五 07:15 (等於 UTC 前一天 23:15)
    # 分鐘: 15, 小時: 23, 日: *, 月: *, 星期: 0-4 (週日至週四)
    - cron: '15 23 * * 0-4'
  workflow_dispatch: # 允許手動執行

jobs:
  analyze_and_news:
    runs-on: ubuntu-latest
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝基本套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests mplfinance

      - name: 執行分析報告 (main.py)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 執行新聞抓取 (stock_news_report.py)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_news_report.py
