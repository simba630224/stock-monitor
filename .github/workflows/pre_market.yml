name: 1. 台北盤前全方位分析 (07:15)

on:
  schedule:
    - cron: '15 23 * * 0-4' # 台北 07:15，週一至週五
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝套件
        run: |
          pip install --upgrade pip
          pip install yfinance pandas requests mplfinance
      - name: 執行分析
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_CSV_TW_URL: ${{ secrets.SHEET_CSV_TW_URL }}
          SHEET_CSV_US_URL: ${{ secrets.SHEET_CSV_US_URL }}
        run: python main.py
