name: 1. 台北盤前全方位掃描 (08:30)

on:
  schedule:
    - cron: '30 0 * * 1-5' # 台北時間 08:30
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install yfinance pandas pandas_ta mplfinance requests
      - name: 執行分析
        env:
          # --- 關鍵對齊點 ---
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
