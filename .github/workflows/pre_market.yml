name: 1. 台北盤前技術分析 (08:30)

on:
  schedule:
    # 台北 08:30 = UTC 00:30
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  technical_analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # 升級到 3.12 以符合套件要求

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas-ta mplfinance requests
          
      - name: 執行分析
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
