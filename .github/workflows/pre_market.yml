name: 1. 台北盤前技術分析 (診斷模式)

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  technical_analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: 安裝套件
        run: pip install -r requirements.txt
        
      - name: 執行分析 (含環境診斷)
        env:
          # 重點：這裡的左邊是程式讀取的名字，右邊是 GitHub 的 Secret 名字
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== 系統診斷開始 ==="
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ 診斷結果：GitHub Shell 完全抓不到 TOKEN 變數"
          else
            echo "✅ 診斷結果：GitHub Shell 已成功接收 TOKEN 變數"
          fi
          echo "===================="
          python main.py
